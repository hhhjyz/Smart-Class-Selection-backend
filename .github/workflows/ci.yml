name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # ---- 静态质量：lint + 类型 + 分层/DIP 契约 ----
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check app tests
      - name: Import-linter（分层 + 依赖倒置契约）
        run: lint-imports
      - name: Pyrefly 类型检查
        run: pyrefly check

  # ---- 测试：unit + integration + e2e，带覆盖率 ----
  # job 跑在 container 内：这是 GitHub 与 act 下都能用「服务名」直连 services 的标准做法
  # （非容器 job 才需 localhost+published-ports）。服务不发布端口到宿主，避免与共享 runner
  # 上既有服务抢占端口。
  test:
    runs-on: ubuntu-latest
    # 镜像同时带 Python 3.11 + Node：测试用 Python，JS actions（checkout/upload-artifact）用 Node。
    # GitHub 容器 job 会自动挂载 node，但 act 不会，故显式选带 node 的基础镜像，两端一致。
    container: nikolaik/python-nodejs:python3.11-nodejs20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cs_user
          POSTGRES_PASSWORD: cs_pwd
          POSTGRES_DB: course_selection
        options: >-
          --health-cmd "pg_isready -U cs_user" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-alpine
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping" --health-interval 10s
          --health-timeout 5s --health-retries 10
    env:
      TEST_PG_DSN: postgres://cs_user:cs_pwd@postgres:5432/course_selection
      TEST_REDIS_URL: redis://redis:6379/0
      TEST_RMQ_URL: amqp://guest:guest@rabbitmq:5672/
    steps:
      - uses: actions/checkout@v4
      # python 已在 container 内，无需 setup-python
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest（unit + integration + e2e + coverage）
        run: |
          pytest \
            --junitxml=reports/junit.xml \
            --cov --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-fail-under=90
      # 仅上传 junit + coverage xml（HTML 报告本地生成；避免大量小文件拖慢上传）
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/junit.xml
            reports/coverage.xml
