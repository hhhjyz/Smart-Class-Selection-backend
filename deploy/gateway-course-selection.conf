# ═══════════════════════════════════════════════════════════════════
# 智能选课（C 组）接入统一网关 STSS-gateway 的片段。
#
# 复制到 STSS-gateway 的 server{} 内即可把本服务挂到网关后面，
# 与 auth/info 服务同一套鉴权：网关经 auth_request 调 auth_service
# POST /api/v1/internal/verify 校验用户 JWT，再用 auth_request_set 取回
# X-User-Id / X-User-Role / X-User-Permissions 注入下游（见 STSS-gateway
# 的 /internal/auth/verify 与 proxy_set_header 全局默认）。
#
# 前提（均已在 STSS-gateway 主配置定义，勿重复）：
#   upstream auth_upstream { ... }                 # auth_service
#   location = /internal/auth/verify { ... }       # auth_request 目标
#   proxy_set_header X-User-Id / X-User-Role / X-User-Permissions（全局默认）
# 这里只新增 course-selection 上游与路由。
# ═══════════════════════════════════════════════════════════════════

upstream course_selection_upstream {
    server course-selection-api:8003;
    keepalive 32;
}

# 选课热路径限流（与全局 login_limit 区分）。
limit_req_zone  $binary_remote_addr zone=cs_ip:10m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=cs_conn:10m;

# 本服务路由前缀 /api/course-selection/v1/*（见各 handler router prefix）。
# 注：A/B 组用 /api/v1/<service>/*，本组沿用既有 /api/course-selection/v1 前缀，
#     网关按前缀路由即可，无需重写。
location ~ ^/api/course-selection/ {
    # 与 auth/info 同一套：先校验用户 token，再由全局默认注入身份头。
    auth_request /internal/auth/verify;

    limit_req  zone=cs_ip burst=200 nodelay;
    limit_conn cs_conn 20;

    proxy_pass http://course_selection_upstream;

    # SSE（AI 助手流式）长连接：关闭缓冲、放长读超时。
    proxy_buffering     off;
    proxy_read_timeout  3600s;
    proxy_http_version  1.1;
}
