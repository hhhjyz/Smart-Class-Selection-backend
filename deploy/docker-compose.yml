# 本组对外测试栈。生产由全系统统一编排，rabbitmq 共用。
services:
  course-selection-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      MODE: api
    env_file: ../.env
    ports:
      - "8003:8003"
    restart: on-failure  # 上游(rabbitmq)就绪前会重试启动
    depends_on:
      - course-selection-pg
      - course-selection-redis
      - rabbitmq

  course-selection-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      MODE: worker
    env_file: ../.env
    restart: on-failure
    depends_on:
      - course-selection-pg
      - course-selection-redis
      - rabbitmq

  course-selection-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cs_user
      POSTGRES_PASSWORD: cs_pwd
      POSTGRES_DB: course_selection
    volumes:
      - ../migrations:/docker-entrypoint-initdb.d:ro
      - cs_pg_data:/var/lib/postgresql/data
    # 不发布到宿主：仅内网供 api/worker 按服务名访问，避免与本机既有服务抢端口

  course-selection-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: stss
      RABBITMQ_DEFAULT_PASS: stss

volumes:
  cs_pg_data:
