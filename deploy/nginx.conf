# 本组【仅本地联调】对外测试入口。下面的 X-User-Id 直接透传客户端头 = 可被伪造，
# 仅用于无网关单机自测（配合 dev_auth_from_token）。生产务必走统一网关 STSS-gateway：
# 网关经 auth_service /internal/verify 校验后注入身份头——接入片段见 gateway-course-selection.conf。
# 流量分层见《04 高并发引擎设计》。

limit_req_zone $binary_remote_addr zone=cs_ip:10m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=cs_conn:10m;

upstream course_selection_api {
    server course-selection-api:8003;
}

server {
    listen 80;
    server_name _;

    location /api/course-selection/ {
        limit_req zone=cs_ip burst=200 nodelay;   # 全局令牌桶 + burst
        limit_conn cs_conn 20;                      # 单 IP 并发连接上限

        proxy_pass http://course_selection_api;
        proxy_set_header X-Request-ID $request_id;
        # 仅联调占位：透传客户端身份头（可伪造）。生产由统一网关 auth_request 后注入。
        proxy_set_header X-User-Id $http_x_user_id;
        proxy_set_header X-User-Role $http_x_user_role;
        proxy_set_header X-User-Permissions $http_x_user_permissions;

        # SSE 长连接支持
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_http_version 1.1;
    }
}
