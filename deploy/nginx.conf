# 本组对外测试入口副本。生产网关由全系统统一配置（TLS / JWT / 身份头透传）。
# 流量分层见《04 高并发引擎设计》。

limit_req_zone $binary_remote_addr zone=cs_ip:10m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=cs_conn:10m;

upstream course_selection_api {
    server course-selection-api:8003;
}

server {
    listen 80;
    server_name _;

    location /api/course-selection/ {
        limit_req zone=cs_ip burst=200 nodelay;   # 全局令牌桶 + burst
        limit_conn cs_conn 20;                      # 单 IP 并发连接上限

        proxy_pass http://course_selection_api;
        proxy_set_header X-Request-ID $request_id;
        # JWT 校验后由网关注入 X-User-ID / X-User-Role（此处为占位，生产在统一网关完成）
        proxy_set_header X-User-ID $http_x_user_id;
        proxy_set_header X-User-Role $http_x_user_role;

        # SSE 长连接支持
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_http_version 1.1;
    }
}
